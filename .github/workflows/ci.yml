name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          global-json-file: global.json

      - name: Restore
        run: dotnet restore code-index.sln

      - name: Build
        run: dotnet build code-index.sln --no-restore -c Release

      - name: Test
        run: dotnet test code-index.sln --no-build -c Release --verbosity normal
